name: Price Tracker

on:
  schedule:
    - cron: '30 7,15 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchomienie skryptu
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python scraper.py

      - name: Zapisanie nowej ceny
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_price.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zaktualizowano zapisaną cenę [skip ci]" && git push)
